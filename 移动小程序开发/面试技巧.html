			<h1>面试技巧</h1>
			<h2>一、面试中的错误</h2>
            <ul>
                <li>千人一面</li>
                <li>过于简单</li>
                <li>乱包装---言过其实</li>
                <li>标准不对---抓不到重点</li>
                <li>“小事”没写</li>
                <li>自我评价空洞</li>
            </ul>
            <h2>二、面试前的功课</h2>
            <ul>
                <li>定位、优势</li>
                <li>企业文化</li>
                <li>行业地位、发展趋势</li>
                <li>岗位要求</li>
                <li>千企一面，乱投？</li>
                <li>根本不记得投过哪些企业</li>
                <li>在本校、本专业的招聘历史</li>
            </ul>
