            <div class="content">
                <div class="left-content">巍巍太行山，大美八泉峡。八泉峡位于山西省长治市壶关县东南部，因有八股泉水同出一地而得名。八泉峡南北长约11公里，占地面积24.11平方公里，最高海拔1700余米，最大落差1100米。<br/>高峡平湖、幽谷听泉、悬流滴翠、壶穴洞天、滴谷九莲、八泉洪纷、玉皇云顶、生肖拜天、千峰竞秀……走进八泉峡立体旅游环线，您将饱览鬼斧神工的峭壁、重峦叠嶂的山峰、千姿百态的山石、绿浪滔天的林海、潺潺流淌的泉水、清澈见底的池潭，北方山川的阳刚之美和江南水乡的阴柔之秀尽收眼底。</div>
